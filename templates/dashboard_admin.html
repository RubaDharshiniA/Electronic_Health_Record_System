{% extends "base.html" %}
{% block content %}

<h2>Admin Dashboard</h2>

<div class="cards">
    <div class="card">
        <h3>Patients</h3>
        <table>
            <tr><th>Name</th><th>Email</th></tr>
            {% for p in patients %}
            <tr><td>{{ p[1] }}</td><td>{{ p[2] }}</td></tr>
            {% endfor %}
        </table>
    </div>

    <div class="card">
        <h3>Doctors</h3>
        <table>
            <tr><th>Name</th><th>Email</th></tr>
            {% for d in doctors %}
            <tr><td>{{ d[1] }}</td><td>{{ d[2] }}</td></tr>
            {% endfor %}
        </table>
    </div>
</div>

{% endblock %}
